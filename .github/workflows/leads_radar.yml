name: Leads Radar

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  run-radar:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run leads radar
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          TAVILY_KEY: ${{ secrets.TAVILY_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_SHEETS_CREDENTIALS: ${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          DRY_RUN: "false"
        run: python -m src.main

      - name: Commit leads.csv
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/leads.csv output/debug_run.json 2>/dev/null || true
          git diff --cached --quiet && echo "No new leads — nothing to commit." || \
            git commit -m "chore: update leads.csv [skip ci]"
          git push || true
